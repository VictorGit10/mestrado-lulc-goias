<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dissertação CIAMB-UFG — Documentação</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --sidebar-width: 280px;
      --bg: #f6f8fa;
      --text: #24292f;
      --text-secondary: #57606a;
      --border: #d0d7de;
      --accent: #0969da;
      --sidebar-bg: #ffffff;
      --code-bg: #f6f8fa;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
    }
    #app {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }
    #sidebar {
      width: var(--sidebar-width);
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    #sidebar header {
      padding: 24px 20px 16px;
      border-bottom: 1px solid var(--border);
    }
    #sidebar header h1 {
      font-size: 16px;
      line-height: 1.35;
      margin: 0 0 4px;
      color: var(--text);
    }
    #sidebar header p {
      font-size: 12px;
      margin: 0;
      color: var(--text-secondary);
    }
    #sidebar nav {
      padding: 12px 0;
      overflow-y: auto;
      flex: 1;
    }
    #sidebar nav a {
      display: block;
      padding: 8px 20px;
      font-size: 14px;
      color: var(--text);
      text-decoration: none;
      border-left: 3px solid transparent;
    }
    #sidebar nav a:hover {
      background: #f3f4f6;
    }
    #sidebar nav a.active {
      background: #eef4ff;
      color: var(--accent);
      border-left-color: var(--accent);
      font-weight: 600;
    }
    #main {
      flex: 1;
      overflow-y: auto;
      padding: 32px 48px;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
    }
    .markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4 {
      margin-top: 24px;
      margin-bottom: 16px;
      font-weight: 600;
      line-height: 1.25;
    }
    .markdown-body h1 { font-size: 28px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
    .markdown-body h2 { font-size: 22px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
    .markdown-body h3 { font-size: 18px; }
    .markdown-body p { line-height: 1.6; margin: 0 0 16px; }
    .markdown-body ul, .markdown-body ol { padding-left: 24px; margin: 0 0 16px; }
    .markdown-body li { margin-bottom: 4px; }
    .markdown-body code {
      background: var(--code-bg);
      padding: 2px 5px;
      border-radius: 4px;
      font-size: 90%;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
    }
    .markdown-body pre {
      background: var(--code-bg);
      padding: 16px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 0 0 16px;
    }
    .markdown-body pre code { padding: 0; background: none; }
    .markdown-body blockquote {
      border-left: 4px solid var(--border);
      padding-left: 16px;
      margin: 0 0 16px;
      color: var(--text-secondary);
    }
    .markdown-body table {
      border-collapse: collapse;
      width: 100%;
      margin: 0 0 16px;
    }
    .markdown-body th, .markdown-body td {
      border: 1px solid var(--border);
      padding: 8px 12px;
      text-align: left;
    }
    .markdown-body th {
      background: var(--code-bg);
      font-weight: 600;
    }
    #menu-toggle {
      display: none;
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 1000;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      cursor: pointer;
    }
    .error {
      color: #cf222e;
      padding: 16px;
      background: #ffebe9;
      border-radius: 6px;
      border: 1px solid #ffdce0;
    }
    @media (max-width: 768px) {
      #app { flex-direction: column; }
      #sidebar {
        position: fixed;
        top: 0;
        left: 0;
        height: 100%;
        z-index: 999;
        transform: translateX(-100%);
        transition: transform 0.2s ease;
        box-shadow: 2px 0 8px rgba(0,0,0,0.1);
      }
      #sidebar.open { transform: translateX(0); }
      #main { padding: 48px 20px 20px; }
      #menu-toggle { display: block; }
    }
  </style>
</head>
<body>
  <button id="menu-toggle" aria-label="Abrir menu">☰</button>
  <div id="app">
    <aside id="sidebar">
      <header>
        <h1>Dissertação CIAMB-UFG</h1>
        <p>Documentação do projeto</p>
      </header>
      <nav id="nav">
        <a href="#" data-file="documentacao.md">Documentação do projeto</a>
        <a href="#" data-file="catalogo_outputs.md">Catálogo de Outputs</a>
        <a href="#" data-file="sugestao_claude.md">Sugestões de Fontes</a>
      </nav>
    </aside>
    <main id="main">
      <div id="content" class="markdown-body">Carregando...</div>
    </main>
  </div>

  <script>
    const contentEl = document.getElementById('content');
    const navEl = document.getElementById('nav');
    const sidebar = document.getElementById('sidebar');
    const menuToggle = document.getElementById('menu-toggle');

    async function loadMarkdown(filename, anchor) {
      contentEl.innerHTML = '<p>Carregando...</p>';
      try {
        const res = await fetch('./md/' + filename);
        if (!res.ok) throw new Error('Erro ' + res.status + ' ao carregar ' + filename);
        const text = await res.text();
        contentEl.innerHTML = marked.parse(text);
        if (anchor) {
          const el = document.getElementById(anchor);
          if (el) el.scrollIntoView();
        } else {
          document.getElementById('main').scrollTop = 0;
          window.scrollTo(0,0);
        }
      } catch (e) {
        contentEl.innerHTML = '<div class="error">Não foi possível carregar o documento.<br><code>' + e.message + '</code><br><br><em>Dica: abra este arquivo via servidor HTTP (ex: <code>python -m http.server</code>) ao invés de file://</em></div>';
      }

      navEl.querySelectorAll('a').forEach(a => {
        a.classList.toggle('active', a.dataset.file === filename);
      });
    }

    navEl.addEventListener('click', (e) => {
      const a = e.target.closest('a[data-file]');
      if (!a) return;
      e.preventDefault();
      const file = a.dataset.file;
      history.replaceState(null, '', '#' + file);
      loadMarkdown(file);
      if (window.innerWidth <= 768) sidebar.classList.remove('open');
    });

    menuToggle.addEventListener('click', () => {
      sidebar.classList.toggle('open');
    });

    // Clica fora fecha menu em mobile
    document.addEventListener('click', (e) => {
      if (window.innerWidth > 768) return;
      if (!sidebar.contains(e.target) && e.target !== menuToggle) {
        sidebar.classList.remove('open');
      }
    });

    // Carrega a partir do hash ou padrão
    const hash = location.hash.replace('#', '') || 'documentacao.md';
    loadMarkdown(hash);
  </script>
</body>
</html>
