Abaixo está a sistematização objetiva do pipeline de pesquisa para o desenvolvimento da dissertação no CIAMB-UFG, focada na dinâmica de uso e cobertura da terra e sua relação com fatores socioeconômicos em Goiás. O resumo exclui variáveis de qualidade e vigor da pastagem, concentrando-se em conversão, estoques e fluxos de área.

1. Escopo Analítico e Eixos de Pesquisa
A análise exploratória estrutura-se no cruzamento de dados geoespaciais e tabulares para o período de 1985 a 2024, utilizando o estado de Goiás como unidade de estudo e seus 246 municípios como unidade de análise espacial.

Eixos de investigação:

Dinâmica de Conversão (Uso e Cobertura): Mapeamento temporal da expansão da pastagem, sua consolidação e posterior substituição por agricultura (ex: soja e cana) ou regeneração de vegetação nativa.

Transição e Vetores: Quantificação da pastagem como estágio intermediário de ocupação do solo (matrizes de transição de desmatamento → pastagem → lavoura).

Variáveis Econômicas e de Infraestrutura: Correlação das mudanças espaciais com a evolução do PIB agropecuário, acesso a crédito rural, produção pecuária (lotação animal, produção de leite/carne) e a instalação de infraestrutura agroindustrial (frigoríficos, estradas e silos).

2. Fontes de Dados e Acessos
Uso e Cobertura da Terra (LULC)

MapBiomas (Coleção 10.1): Dados anuais de 1985 a 2024 (resolução 30m).

Classes prioritárias: 15 (Pastagem), 3, 4, 11, 12 (Vegetação Nativa), 18, 20, 39, 41 (Agricultura).

Acesso recomendado: Google Earth Engine (GEE).

Asset de Cobertura: projects/mapbiomas-public/assets/brazil/lulc/collection10_1/mapbiomas_brazil_collection10_1_coverage_v1

Transições: Assets de transição do MapBiomas para pares de anos específicos.

Dados Socioeconômicos (IBGE)

Acesso: API SIDRA ou biblioteca Python sidrapy.

Pesquisa Pecuária Municipal (PPM): Tabela 3939 (Efetivo de rebanhos) e Tabelas 74/94 (Produção pecuária/leite).

Produção Agrícola Municipal (PAM): Tabelas 1612 (Lavouras temporárias) e 1613 (Lavouras permanentes).

PIB Municipal: Tabela 5938 (PIB a preços correntes por setor).

Demografia e Censo Agropecuário: Tabelas 200/6579 (População) e 6778 (Censo Agro).

Crédito Rural

SICOR (Banco Central): Dados municipalizados sobre custeio e investimento (operações de maquinário, formação de pastagem, etc.).

API OData: https://olinda.bcb.gov.br/olinda/servico/SICOR/versao/v2/odata/

Microdados: https://www.bcb.gov.br/estabilidadefinanceira/micrrural

Infraestrutura e Parque Agroindustrial

Frigoríficos SIF (Federal): Cadastro SIGSIF/MAPA.

Acesso: https://sigsif.agricultura.gov.br/sigsif_cons/!ap_estabelec_nacional_cons

Frigoríficos SIE (Estadual Goiás): Agrodefesa-GO.

Acesso: https://goias.gov.br/agrodefesa/dados-sobre-sobre-estabelecimentos-do-servico-de-inspecao-estadual-sie/

Malha Viária e Hidrovias: Sistema Nacional de Viação (SNV/DNIT).

Acesso: https://www.gov.br/dnit/pt-br/assuntos/atlas-e-mapas

Armazéns e Silos: CONAB.

Acesso: https://sisdep.conab.gov.br/

Indicadores de Bem-estar

IDH Municipal: Atlas do Desenvolvimento Humano (PNUD).

Acesso: http://www.atlasbrasil.org.br/

3. Metodologia de Tratamento e Espacialização
Padronização da Malha Base: Utilização da malha municipal do IBGE de um ano de referência (ex: 2020) via pacote geobr. Os dados históricos devem ser ajustados para esta malha para lidar com desmembramentos de municípios.

Processamento LULC (Redução Espacial): Execução de tabulação cruzada no GEE (reduceRegions com frequencyHistogram). O objetivo é extrair uma tabela em que cada linha represente um município, ano e a área em hectares para cada classe de uso da terra, dispensando o download de rasters brutos.

Matrizes de Transição: Cruzamento de rasters de diferentes anos no GEE para compor tabelas de fluxo (ex: Hectares que eram Classe 3 em 1995 e viraram Classe 15 em 2005).

Integração de Dados Tabulares: Junção (join) dos dados do IBGE, BACEN e PNUD ao GeoDataFrame da malha municipal utilizando o código IBGE de 7 dígitos como chave.

Deflação Econômica: Conversão de todas as séries financeiras (PIB, crédito) para valores reais utilizando um índice oficial (como o IPCA ou IGP-DI), estabelecendo um mês/ano base para fins de comparabilidade temporal.

Geocodificação de Infraestrutura: Conversão de endereços de frigoríficos e armazéns em coordenadas geográficas pontuais. Posterior cálculo de métricas espaciais, como contagem de plantas por município ou distância do centroide municipal até o frigorífico mais próximo.

4. Stack Tecnológico
A integração dos fluxos será feita coordenando as seguintes tecnologias:

Google Earth Engine (Python API): Processamento em nuvem das séries temporais do MapBiomas e extração de tabelas e matrizes.

Python Geoespacial: Ambiente principal para a construção dos pipelines de dados e análises descritivas (geopandas, pandas, rasterio, matplotlib, seaborn).

APIs e Conectores Python: Automação da coleta de dados tabulares (sidrapy para IBGE, bibliotecas de requisição para OData do BACEN).

QGIS: Reservado especificamente para a inspeção visual de anomalias espaciais e para o desenvolvimento dos layouts cartográficos finais (mapas de capa).