<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Obrigado — Goiás 1985-2024</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+Pro:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f0f;
      --fg: #fafaf7;
      --accent: #c45a3a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: "Source Serif Pro", Georgia, serif;
      color: var(--fg);
    }

    canvas {
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      pointer-events: none;
    }

    .content {
      opacity: 0;
      transform: scale(0.92);
      animation: reveal 1.4s cubic-bezier(0.22, 1, 0.36, 1) 0.6s forwards;
    }

    @keyframes reveal {
      to { opacity: 1; transform: scale(1); }
    }

    .obrigado {
      font-size: clamp(3rem, 8vw, 7rem);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.03em;
      margin-bottom: 0.5rem;
    }

    .obrigado span {
      display: inline-block;
      opacity: 0;
      transform: translateY(30px);
      animation: letterReveal 0.8s ease forwards;
    }

    @keyframes letterReveal {
      to { opacity: 1; transform: translateY(0); }
    }

    .sub {
      font-size: clamp(1rem, 2.2vw, 1.5rem);
      color: #999;
      font-weight: 400;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 1s ease 2s forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
      from { opacity: 0; transform: translateY(12px); }
    }

    .hint {
      font-family: system-ui, sans-serif;
      font-size: 0.8rem;
      color: #666;
      letter-spacing: 0.05em;
      opacity: 0;
      animation: fadeUp 1s ease 3s forwards;
    }

    .hint a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.3s;
      pointer-events: auto;
    }

    .hint a:hover {
      border-bottom-color: var(--accent);
    }
  </style>
</head>
<body>

  <canvas id="canvas"></canvas>

  <div class="overlay">
    <div class="content">
      <h1 class="obrigado" id="obrigado">Obrigado!</h1>
      <p class="sub">Cada pixel conta uma história. Obrigado por acompanhar esta.</p>
      <p class="hint">
        <a href="index.html">Voltar à visualização</a>
      </p>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let w, h;

    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // Cores do MapBiomas/LULC do projeto
    const PALETTE = [
      '#2d5a3d', // veg natural
      '#d4b65a', // pastagem
      '#c45a3a', // terracota/soja
      '#d96aa3', // agricultura
      '#4a7ba6', // agua
      '#8a8a82', // urbano
      '#c4ad8a', // outros
    ];

    const PARTICLE_COUNT = Math.min(220, Math.floor((window.innerWidth * window.innerHeight) / 6000));
    const CONNECTION_DIST = 140;
    const MOUSE_RADIUS = 180;

    let mouse = { x: -1000, y: -1000 };

    class Particle {
      constructor() {
        this.reset();
        // Distribuir inicialmente por toda a tela
        this.x = Math.random() * w;
        this.y = Math.random() * h;
      }

      reset() {
        this.x = Math.random() * w;
        this.y = Math.random() * h;
        this.vx = (Math.random() - 0.5) * 0.6;
        this.vy = (Math.random() - 0.5) * 0.6;
        this.radius = Math.random() * 2 + 1.2;
        this.color = PALETTE[Math.floor(Math.random() * PALETTE.length)];
        this.alpha = Math.random() * 0.5 + 0.3;
        this.baseAlpha = this.alpha;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;

        // Wrap around
        if (this.x < -10) this.x = w + 10;
        if (this.x > w + 10) this.x = -10;
        if (this.y < -10) this.y = h + 10;
        if (this.y > h + 10) this.y = -10;

        // Mouse interaction
        const dx = this.x - mouse.x;
        const dy = this.y - mouse.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < MOUSE_RADIUS) {
          const force = (MOUSE_RADIUS - dist) / MOUSE_RADIUS;
          const angle = Math.atan2(dy, dx);
          this.vx += Math.cos(angle) * force * 0.15;
          this.vy += Math.sin(angle) * force * 0.15;
          this.alpha = Math.min(1, this.baseAlpha + force * 0.5);
        } else {
          this.alpha += (this.baseAlpha - this.alpha) * 0.05;
        }

        // Damping
        this.vx *= 0.99;
        this.vy *= 0.99;
      }

      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.globalAlpha = this.alpha;
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }

    const particles = [];
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      particles.push(new Particle());
    }

    function drawConnections() {
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < CONNECTION_DIST) {
            const opacity = (1 - dist / CONNECTION_DIST) * 0.12;
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = `rgba(200, 200, 180, ${opacity})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }
    }

    function animate() {
      ctx.clearRect(0, 0, w, h);

      // Subtle gradient background
      const grad = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, Math.max(w, h) * 0.8);
      grad.addColorStop(0, '#1a1a18');
      grad.addColorStop(1, '#0f0f0f');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h);

      drawConnections();

      particles.forEach(p => {
        p.update();
        p.draw();
      });

      requestAnimationFrame(animate);
    }
    animate();

    // Mouse tracking
    window.addEventListener('mousemove', (e) => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });

    window.addEventListener('touchmove', (e) => {
      if (e.touches.length > 0) {
        mouse.x = e.touches[0].clientX;
        mouse.y = e.touches[0].clientY;
      }
    });

    // Letter stagger for "Obrigado!"
    const title = document.getElementById('obrigado');
    const text = title.textContent;
    title.innerHTML = '';
    text.split('').forEach((char, i) => {
      const span = document.createElement('span');
      span.textContent = char === ' ' ? ' ' : char;
      span.style.animationDelay = `${0.8 + i * 0.08}s`;
      title.appendChild(span);
    });
  </script>

</body>
</html>
